# mgit GoReleaser configuration
# Triggered by: git tag v*.*.* && goreleaser release
version: 2

project_name: mgit

before:
  hooks:
    - go mod tidy
    - go test ./... -count=1

builds:
  - id: mgit
    main: ./cmd/mgit/
    binary: mgit
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goamd64:
      - v1

archives:
  - id: mgit-archive
    builds:
      - mgit
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: hyper-swe
    name: mgit-dev
  draft: false
  prerelease: auto
  name_template: "mgit {{.Tag}}"
