prefix: "MGIT"

api:
  grpc_port: 6850
  http_port: 6849
  rate_limit: 100
  bind: 127.0.0.1

mcp:
  enabled: true
  transport: "stdio"

data:
  dir: ".mtix/data"
  soft_delete_retention: "30d"

sync:
  interval: "30s"
  enabled: false
  endpoint: 
  auto_sync: true
  team_id: 

agent:
  stale_threshold: "24h"
  id_pattern: "agent-*"
  session_timeout: "4h"
  stuck_timeout: 
  auto_claim: true
  heartbeat_interval: "60s"

context:
  token_estimator: "chars4"

logging:
  file: ".mtix/logs/mtix.log"
  level: "info"

progress:
  weighted: false

ui:
  collapse_done: false
  default_depth: 3
  theme: "system"
