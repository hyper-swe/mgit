# golangci-lint v2 configuration for mgit
# Safety-critical micro version control system.
version: "2"

linters:
  enable:
    # Security
    - gosec
    - sqlclosecheck
    - bodyclose
    - noctx

    # Code quality
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unconvert
    - misspell
    - usestdlibvars
    - gocritic
    - revive
    - prealloc

    # Additional
    - unused
    - copyloopvar
    - durationcheck
    - errname
    - errorlint
    - makezero
    - nilerr
    - reassign
    - wastedassign

  settings:
    govet:
      enable:
        - nilness
        - unusedresult
        - unreachable
    gocritic:
      enabled-tags:
        - diagnostic
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: var-declaration
        - name: var-naming
    gosec:
      excludes:
        - G115
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (io.Closer).Close
        - (*database/sql.Rows).Close
        - (*database/sql.DB).Close
        - (*os.File).Close
    misspell:
      locale: US

  exclusions:
    rules:
      # Allow dot imports in test files for testify
      - path: _test\.go
        linters:
          - revive
        text: "dot-imports"

      # Test files can have larger params
      - path: _test\.go
        linters:
          - gocritic
        text: "hugeParam"

      # CLI output to stdout — errcheck on fmt.Fprint* is noise
      - path: cmd/
        linters:
          - errcheck

      # httptest.NewRequest is fine in tests
      - path: _test\.go
        linters:
          - noctx

    paths:
      - vendor

formatters:
  enable:
    - gofmt

run:
  timeout: 5m
  modules-download-mode: readonly
